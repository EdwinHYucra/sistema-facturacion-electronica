<header class="sticky top-0 z-30 flex h-16 items-center justify-between border-b border-slate-200 bg-white px-4 sm:px-6">
  <div class="flex min-w-0 items-center gap-3">
    <button
      type="button"
      (click)="menuClick.emit()"
      class="inline-flex h-9 w-9 items-center justify-center rounded-lg border border-slate-200 text-slate-600 transition hover:bg-slate-50 lg:hidden"
      title="Abrir menú"
    >
      <lucide-icon [img]="menuIcon" class="h-5 w-5"></lucide-icon>
    </button>

    <h2 class="truncate text-sm font-semibold text-slate-800">
      Sistema Web de Facturación Electrónica
    </h2>
  </div>

  <div class="hidden w-72 items-center rounded-lg border border-slate-200 bg-white px-3 py-2 md:flex">
    <span class="mr-2 text-slate-400">⌕</span>
    <input
      type="text"
      placeholder="Buscar..."
      class="w-full border-none bg-transparent text-sm text-slate-700 outline-none placeholder:text-slate-400"
    />
  </div>

  <div class="flex items-center gap-3">
    <button class="relative rounded-full p-2 text-slate-500 transition hover:bg-slate-100">
      🔔
      <span class="absolute right-2 top-2 h-2 w-2 rounded-full bg-red-500"></span>
    </button>

    <div class="flex h-9 w-9 items-center justify-center rounded-full bg-amber-100 text-sm font-bold text-amber-600">
      U
    </div>
  </div>
</header>
